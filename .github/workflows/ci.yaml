name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  api:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: http://localhost:54321
      DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Supabase CLI
        run: |
          # Extract in /tmp — the repo has a `supabase/` directory at root,
          # so extracting in-place collides with `tar: supabase: File exists`.
          cd /tmp
          curl -fsSL -o supabase.tar.gz \
            https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz
          tar -xzf supabase.tar.gz
          sudo mv supabase /usr/local/bin/
          rm supabase.tar.gz
          supabase --version

      - name: Start Supabase
        run: supabase start

      - name: Set Supabase env vars
        run: |
          # `supabase status -o env` emits KEY="value" with literal quotes.
          # Strip them via tr -d '"' or the exported vars become `"eyJ..."`
          # and the Supabase Admin API rejects them with 403 Forbidden.
          ANON_KEY=$(supabase status -o env | awk -F= '/^ANON_KEY=/ {print $2}' | tr -d '"')
          SERVICE_ROLE=$(supabase status -o env | awk -F= '/^SERVICE_ROLE_KEY=/ {print $2}' | tr -d '"')
          JWT_SECRET=$(supabase status -o env | awk -F= '/^JWT_SECRET=/ {print $2}' | tr -d '"')
          echo "SUPABASE_ANON_KEY=${ANON_KEY}" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE=${SERVICE_ROLE}" >> "$GITHUB_ENV"
          echo "SUPABASE_JWT_SECRET=${JWT_SECRET}" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        working-directory: apps/api
        run: uv sync

      - name: Run Alembic migrations
        working-directory: apps/api
        run: uv run alembic upgrade head

      - name: Run pytest with coverage
        working-directory: apps/api
        run: uv run pytest --cov=src/dailyriff_api --cov-fail-under=85

      - name: Run Schemathesis contract tests
        working-directory: apps/api
        run: |
          uv run uvicorn dailyriff_api.main:app --host 0.0.0.0 --port 8000 &
          UVICORN_PID=$!
          trap 'kill $UVICORN_PID 2>/dev/null || true' EXIT
          curl --retry-connrefused --retry 15 --retry-delay 1 --retry-all-errors \
            --silent --fail http://localhost:8000/health > /dev/null
          # Generate a valid JWT so schemathesis can hit the 5 protected endpoints
          # as an authenticated user. Without this, every request returns 401 and
          # schemathesis flags 'Authentication failed' on 5 operations.
          TEST_JWT=$(uv run python -c "
          import jwt, os, time
          claims = {
              'sub': '00000000-0000-0000-0000-000000000001',
              'aud': 'authenticated',
              'exp': int(time.time()) + 3600,
              'email': 'test@dailyriff.local',
              'app_metadata': {'role': 'authenticated'},
          }
          print(jwt.encode(claims, os.environ['SUPABASE_JWT_SECRET'], algorithm='HS256'))
          ")
          uv run schemathesis run http://localhost:8000/openapi.json --checks all \
            --header "Authorization: Bearer $TEST_JWT"

      - name: Check OpenAPI snapshot freshness
        working-directory: apps/api
        run: |
          uv run python -m dailyriff_api.scripts.dump_openapi > /tmp/fresh.json
          diff /tmp/fresh.json openapi.snapshot.json || {
            echo "::error::OpenAPI snapshot is stale. Run 'pnpm --filter api regenerate-openapi' and commit the updated snapshot."
            exit 1
          }

  codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate API client
        run: pnpm --filter api-client generate

      - name: Check for uncommitted codegen changes
        run: |
          git diff --exit-code packages/api-client/src || {
            echo "::error::Generated API client is out of date. Run 'pnpm --filter api-client generate' and commit the changes."
            exit 1
          }

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter web lint

      - name: Run tests with coverage
        run: pnpm --filter web test -- --coverage

      - name: Build
        run: pnpm --filter web build

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: pnpm --filter web exec playwright test

  mobile-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter mobile lint

      - name: Run tests with coverage
        run: pnpm --filter mobile test -- --coverage
